{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card atm-card p-4">
            <h3 class="text-center mb-4">Welcome to ATM</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Account Name / Username</label>
                    <input type="text" name="username" class="form-control" required autocomplete="off">
                </div>
                <div class="mb-4">
                    <label class="form-label">Secret PIN</label>
                    <input type="password" name="pin" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" name="action" value="login" class="btn btn-primary btn-lg">Insert Card (Login)</button>
                    <button type="submit" name="action" value="register" class="btn btn-outline-secondary">Open New Account</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
