{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card glass-card p-4">
            <h3 class="text-center mb-4 text-primary fw-bold">Login</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">Sign In</button>
            </form>
            <div class="text-center mt-3">
                <a href="/register" class="text-decoration-none text-muted">Don't have an account? <span class="text-primary fw-bold">Register here</span></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
