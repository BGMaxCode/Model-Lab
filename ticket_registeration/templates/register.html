{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card glass-card p-4">
            <h3 class="text-center mb-4 text-success fw-bold">Register</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold shadow-sm">Register</button>
            </form>
            <div class="text-center mt-3">
                <a href="/login" class="text-decoration-none text-muted">Already have an account? <span class="text-success fw-bold">Login here</span></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
